<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll20 API Script</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Roll20 API Script</p>
        </div>
        <output class="copy-status" id="copy-status" aria-live="polite"></output>
      </header>

      <div class="workspace">
        <aside class="module-panel" aria-label="선택 가능한 스크립트">
          <div class="module-list" id="module-list"></div>
        </aside>

        <section class="preview-panel" aria-label="코드 프리뷰">
          <div class="panel-heading">
            <button class="copy-button" id="copy-code" type="button">복사</button>
          </div>
          <pre class="code-preview" aria-live="polite"><code id="code-preview"></code></pre>
        </section>
      </div>

    </main>

    <script type="module" src="src/scriptMixer.js"></script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
