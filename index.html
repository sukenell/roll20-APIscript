<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R20 API BY NELL</title>
    <meta property="og:title" content="R20 API BY NELL" />
    <meta name="twitter:title" content="R20 API BY NELL" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Roll20 API script by nell</p>
        </div>
        <output class="copy-status" id="copy-status" aria-live="polite"></output>
      </header>

      <div class="workspace">
        <aside class="module-panel" aria-label="선택 가능한 스크립트">
          <div class="module-list" id="module-list"></div>
        </aside>

        <section class="preview-panel" aria-label="코드 프리뷰">
          <div class="preview-toolbar">
            <strong>R20 API</strong>
            <span>LIVE PREVIEW</span>
          </div>
          <div class="preview-document-bar">
            <strong>roll20-api.js</strong>
            <output id="preview-meta">0 modules</output>
          </div>
          <textarea
            class="code-preview"
            id="code-preview"
            aria-label="생성된 Roll20 API 코드"
            aria-live="polite"
            readonly
            spellcheck="false"
          ></textarea>
          <div class="preview-actions">
            <button class="copy-button" id="copy-code" type="button">복사</button>
          </div>
        </section>
      </div>

    </main>

    <script type="module" src="src/scriptMixer.js"></script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
